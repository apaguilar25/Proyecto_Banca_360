<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Depósito · Banca 360</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/data.js"></script>
  <script>requireAuth();</script>
</head>
<body data-page="deposit">
  <div class="app-shell">
    <header class="header">
      <div class="header-left">
        <button class="icon-btn hamburger" id="hamburgerBtn" aria-label="Abrir menú"><i class="ph ph-list"></i></button>
        <a class="brand" href="dashboard.html"><div class="logo-dot"><i class="ph ph-bank"></i></div>Banca 360</a>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="toggleTheme"><i class="ph ph-moon"></i></button>
        <a class="icon-btn" href="profile.html"><i class="ph ph-user-circle"></i></a>
      </div>
    </header>

    <div class="app-body">
      <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
      <nav class="sidebar" aria-label="Navegación principal">
        <a class="nav-item" data-nav="dashboard"     href="dashboard.html"><i class="ph ph-squares-four"></i><span class="label">Dashboard</span></a>
        <a class="nav-item" data-nav="transfer"      href="transfer.html"><i class="ph ph-paper-plane-tilt"></i><span class="label">Transferencias</span></a>
        <a class="nav-item" data-nav="mobilePayment" href="mobilePayment.html"><i class="ph ph-device-mobile"></i><span class="label">Pago Móvil</span></a>
        <a class="nav-item" data-nav="deposit"       href="deposit.html"><i class="ph ph-wallet"></i><span class="label">Depósitos</span></a>
        <a class="nav-item" data-nav="history"       href="history.html"><i class="ph ph-clock-counter-clockwise"></i><span class="label">Historial</span></a>
        <a class="nav-item" data-nav="profile"       href="profile.html"><i class="ph ph-gear"></i><span class="label">Configuración</span></a>
      </nav>

      <main class="main-content">
        <a class="back-link" href="dashboard.html"><i class="ph ph-arrow-left"></i> Volver al dashboard</a>

        <header>
          <h1 class="page-title">Depósito</h1>
          <p class="text-muted">Acredita un monto simulado a tu cuenta principal.</p>
        </header>

        <section class="card" style="max-width: 520px;">
          <form id="depForm" novalidate>
            <div class="form-group">
              <label class="form-label" for="depMonto">Monto a depositar</label>
              <input class="form-input" id="depMonto" type="number" step="0.01" min="0.01"
                     placeholder="0.00" required />
            </div>
            <p id="depError" class="form-error" hidden></p>
            <div class="flex-row mt-16">
              <button type="submit" class="btn-primary"><i class="ph ph-wallet"></i> Confirmar depósito</button>
              <a class="btn-secondary" href="dashboard.html">Cancelar</a>
            </div>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script src="js/shell.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/deposit.js"></script>
</body>
</html>
